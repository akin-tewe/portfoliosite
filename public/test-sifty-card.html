<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sifty Card Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ebebeb;
    }
    .card {
      position: relative;
      width: 800px;
      aspect-ratio: 9 / 5;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    /*
      Centered composition math:
      Desktop: 68% wide, left 12%. Right edge: 80%.
      Phone: 18% wide, left 70%. Right edge: 88%.
      Overlap: 80% - 70% = 10% overlap.
      Full span: 12% to 88%. Center: 50%. Perfectly centered.
    */
    .desktop-frame {
      position: absolute;
      left: 12%;
      top: 50%;
      transform: translateY(-50%);
      width: 68%;
      aspect-ratio: 16 / 10;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
      z-index: 1;
    }
    .phone-frame {
      position: absolute;
      left: 70%;
      top: 50%;
      transform: translateY(-50%);
      width: 16%;
      aspect-ratio: 9 / 19.5;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      z-index: 2;
    }
    .desktop-frame video,
    .phone-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Prominent white inner shadow — visible vignette on dark video */
    .desktop-frame::after,
    .phone-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 40px 12px rgba(255,255,255,0.18);
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="desktop-frame">
      <video src="/projects/sifty/main_thumbnail_video.mp4" autoplay loop muted playsinline></video>
    </div>
    <div class="phone-frame">
      <video src="/projects/sifty/mobile_view.mp4" autoplay loop muted playsinline></video>
    </div>
  </div>
</body>
</html>
