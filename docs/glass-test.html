<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Liquid Glass Dot Test v5</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    min-height: 100vh; background: #d0d0d0; font-family: sans-serif; gap: 20px; padding: 20px;
  }
  .test-card {
    width: 700px; height: 400px; border-radius: 16px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #f5ece3 0%, #d4ddd4 40%, #e8ddd1 70%, #f5ece3 100%);
  }
  .test-card::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(0,0,0,0.08) 19px, rgba(0,0,0,0.08) 20px),
      repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(0,0,0,0.08) 19px, rgba(0,0,0,0.08) 20px);
  }
  .test-card .text-overlay {
    position: absolute; top: 20px; left: 20px; 
    font-size: 48px; font-weight: 900; color: rgba(0,0,0,0.12);
    line-height: 1.1;
  }
  .dots-container {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 16px;
  }
  .glass-dot {
    width: 60px; height: 60px; border-radius: 50%;
    backdrop-filter: url(#glass-circle);
    -webkit-backdrop-filter: url(#glass-circle);
  }
  .previews { display: flex; gap: 20px; align-items: start; flex-wrap: wrap; }
  .previews canvas { border: 1px solid #999; image-rendering: pixelated; }
  .previews label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
  #debug { font-size: 12px; color: #666; max-width: 700px; }
</style>
</head>
<body>
  <h3>Liquid Glass v5 — Wider rim spread + visible fill</h3>
  
  <div class="test-card">
    <div class="text-overlay">ABCDEFGH<br>IJKLMNOP<br>QRSTUVWX<br>12345678</div>
    <div class="dots-container">
      <div class="glass-dot"></div>
      <div class="glass-dot"></div>
      <div class="glass-dot"></div>
    </div>
  </div>

  <div class="previews">
    <div><label>Displacement</label><canvas id="disp-preview" width="128" height="128" style="width:128px;height:128px;"></canvas></div>
    <div><label>Specular + Fill</label><canvas id="spec-preview" width="128" height="128" style="width:128px;height:128px;"></canvas></div>
    <div id="debug"></div>
  </div>

  <svg width="0" height="0" style="position:absolute;" colorInterpolationFilters="sRGB">
    <defs>
      <filter id="glass-circle">
        <feImage id="fi-disp" x="0" y="0" width="60" height="60" 
                 result="disp_map" preserveAspectRatio="none" />
        <feDisplacementMap id="fdm" in="SourceGraphic" in2="disp_map"
                          xChannelSelector="R" yChannelSelector="G" result="refracted" />
        <feColorMatrix in="refracted" type="saturate" values="1.3" result="saturated" />
        <feImage id="fi-spec" x="0" y="0" width="60" height="60"
                 result="specular" preserveAspectRatio="none" />
        <feBlend in="saturated" in2="specular" mode="screen" />
      </filter>
    </defs>
  </svg>

  <script>
    const DOT_SIZE = 60;
    const MAP_SIZE = 256;
    const BEZEL_RATIO = 0.4;
    const N1 = 1.0;
    const N2 = 1.5;
    const GLASS_THICKNESS = 1.0;

    const PRIMARY_LIGHT_DEG = -120;
    const SECONDARY_LIGHT_DEG = 60;
    const PRIMARY_INTENSITY = 1.0;
    const SECONDARY_INTENSITY = 0.3;
    const SPECULAR_POWER = 6;          // lower = wider spread along the rim
    const SPECULAR_BRIGHTNESS = 3.5;

    const FILL_OPACITY = 0.18;         // 18% — clearly visible milky tint
    const FILL_EDGE_BOOST = 0.10;      // extra 10% near edges

    const RIM_R = 240;
    const RIM_G = 245;
    const RIM_B = 255;

    const debug = document.getElementById('debug');
    function log(msg) { debug.innerHTML += msg + '<br>'; }

    function surfaceHeight(t) {
      return Math.pow(1 - Math.pow(1 - t, 4), 0.25);
    }

    // ========== DISPLACEMENT MAP ==========
    const displacements = [];
    for (let i = 0; i <= 127; i++) {
      const t = i / 127;
      const h = surfaceHeight(t) * GLASS_THICKNESS;
      const delta = 0.001;
      const h1 = surfaceHeight(Math.max(0, t - delta)) * GLASS_THICKNESS;
      const h2 = surfaceHeight(Math.min(1, t + delta)) * GLASS_THICKNESS;
      const derivative = (h2 - h1) / (2 * delta);
      const incidentAngle = Math.atan(Math.abs(derivative));
      const sinRefracted = (N1 / N2) * Math.sin(incidentAngle);
      if (Math.abs(sinRefracted) >= 1) { displacements.push(0); continue; }
      const refractedAngle = Math.asin(sinRefracted);
      const sign = derivative >= 0 ? -1 : 1;
      displacements.push(h * Math.tan(refractedAngle) * sign);
    }
    const maxMag = Math.max(...displacements.map(Math.abs));

    const dispCanvas = document.createElement('canvas');
    dispCanvas.width = MAP_SIZE; dispCanvas.height = MAP_SIZE;
    const dctx = dispCanvas.getContext('2d');
    const dImg = dctx.createImageData(MAP_SIZE, MAP_SIZE);
    const dd = dImg.data;
    const center = MAP_SIZE / 2;
    const radius = MAP_SIZE / 2;
    const bezelWidth = radius * BEZEL_RATIO;

    for (let y = 0; y < MAP_SIZE; y++) {
      for (let x = 0; x < MAP_SIZE; x++) {
        const dx = x - center; const dy = y - center;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const idx = (y * MAP_SIZE + x) * 4;
        if (dist >= radius) {
          dd[idx] = 128; dd[idx+1] = 128; dd[idx+2] = 128; dd[idx+3] = 255;
          continue;
        }
        const distFromEdge = radius - dist;
        const t = Math.min(distFromEdge / bezelWidth, 1);
        const sampleIdx = Math.round(t * 127);
        const normalizedMag = maxMag === 0 ? 0 : displacements[sampleIdx] / maxMag;
        const angle = Math.atan2(dy, dx);
        dd[idx]   = Math.round(Math.max(0, Math.min(255, 128 + Math.cos(angle) * normalizedMag * 127)));
        dd[idx+1] = Math.round(Math.max(0, Math.min(255, 128 + Math.sin(angle) * normalizedMag * 127)));
        dd[idx+2] = 128; dd[idx+3] = 255;
      }
    }
    dctx.putImageData(dImg, 0, 0);
    const dispDataUrl = dispCanvas.toDataURL();

    // ========== SPECULAR + FILL MAP ==========
    const light1 = { x: Math.cos(PRIMARY_LIGHT_DEG * Math.PI / 180), y: Math.sin(PRIMARY_LIGHT_DEG * Math.PI / 180) };
    const light2 = { x: Math.cos(SECONDARY_LIGHT_DEG * Math.PI / 180), y: Math.sin(SECONDARY_LIGHT_DEG * Math.PI / 180) };

    const specCanvas = document.createElement('canvas');
    specCanvas.width = MAP_SIZE; specCanvas.height = MAP_SIZE;
    const sctx = specCanvas.getContext('2d');
    const sImg = sctx.createImageData(MAP_SIZE, MAP_SIZE);
    const sd = sImg.data;

    for (let y = 0; y < MAP_SIZE; y++) {
      for (let x = 0; x < MAP_SIZE; x++) {
        const dx = x - center; const dy = y - center;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const idx = (y * MAP_SIZE + x) * 4;

        if (dist >= radius) {
          sd[idx] = 0; sd[idx+1] = 0; sd[idx+2] = 0; sd[idx+3] = 0;
          continue;
        }

        const distFromEdge = radius - dist;
        const t = Math.min(distFromEdge / bezelWidth, 1);

        // --- Glass fill ---
        const fillAlpha = (FILL_OPACITY + (1 - t) * FILL_EDGE_BOOST) * 255;

        // --- Rim specular: edge-concentrated, radially thin ---
        // Radial thinness: only outer ~20% of bezel, steep cubic falloff
        const edgeFactor = Math.pow(Math.max(0, 1 - t * 5), 3);

        const nx = dist > 0 ? dx / dist : 0;
        const ny = dist > 0 ? dy / dist : 0;

        // Lower power = wider arc spread around the circle
        const dot1 = nx * light1.x + ny * light1.y;
        const spec1 = Math.pow(Math.max(0, dot1), SPECULAR_POWER) * PRIMARY_INTENSITY;

        const dot2 = nx * light2.x + ny * light2.y;
        const spec2 = Math.pow(Math.max(0, dot2), SPECULAR_POWER) * SECONDARY_INTENSITY;

        const specIntensity = (spec1 + spec2) * edgeFactor * SPECULAR_BRIGHTNESS;
        const specAlpha = Math.min(255, specIntensity * 255);

        const totalAlpha = Math.min(255, specAlpha + fillAlpha);

        if (totalAlpha < 1) {
          sd[idx] = 0; sd[idx+1] = 0; sd[idx+2] = 0; sd[idx+3] = 0;
          continue;
        }

        const specWeight = specAlpha / totalAlpha;
        const fillWeight = 1 - specWeight;

        sd[idx]   = Math.round(RIM_R * specWeight + 235 * fillWeight);
        sd[idx+1] = Math.round(RIM_G * specWeight + 240 * fillWeight);
        sd[idx+2] = Math.round(RIM_B * specWeight + 255 * fillWeight);
        sd[idx+3] = Math.round(totalAlpha);
      }
    }
    sctx.putImageData(sImg, 0, 0);
    const specDataUrl = specCanvas.toDataURL();

    // ========== PREVIEWS ==========
    const dp = document.getElementById('disp-preview').getContext('2d');
    dp.imageSmoothingEnabled = false;
    dp.drawImage(dispCanvas, 0, 0, 128, 128);

    const sp = document.getElementById('spec-preview').getContext('2d');
    sp.fillStyle = '#222';
    sp.fillRect(0, 0, 128, 128);
    sp.imageSmoothingEnabled = false;
    sp.drawImage(specCanvas, 0, 0, 128, 128);

    // ========== WIRE UP SVG FILTER ==========
    document.getElementById('fi-disp').setAttribute('href', dispDataUrl);
    document.getElementById('fi-spec').setAttribute('href', specDataUrl);
    document.getElementById('fdm').setAttribute('scale', 15);

    log('Specular power: ' + SPECULAR_POWER + ' (lower = wider rim arc)');
    log('Edge radial falloff: outer 20%, cubic');
    log('Fill opacity: ' + (FILL_OPACITY * 100) + '% + ' + (FILL_EDGE_BOOST * 100) + '% edge boost');
    log('Rim tint: rgb(' + RIM_R + ',' + RIM_G + ',' + RIM_B + ')');
  </script>
</body>
</html>
