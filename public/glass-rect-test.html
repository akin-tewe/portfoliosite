<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Rectangle Test — feTurbulence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #18181b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .wrapper {
      position: relative;
      width: 296px;
      height: 336px;
    }

    .chat-content {
      position: absolute;
      inset: 0;
      background: #0e0e10;
      border-radius: 16px;
      padding: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .chat-line .username { font-weight: 600; }
    .chat-line .colon { color: #adadb8; }
    .chat-line .message { color: #efeff1; }

    .glass-rect {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 296px;
      height: 336px;
      border-radius: 16px;
      isolation: isolate;
      box-shadow: 0 0 40px rgba(145, 71, 255, 0.12);
      pointer-events: none;
    }

    .glass-rect::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: 16px;
      box-shadow: inset 0 0 14px -4px rgba(180, 150, 255, 0.6);
      background-color: rgba(145, 71, 255, 0.05);
    }

    .glass-rect::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: 16px;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      filter: url(#glass-distortion);
      -webkit-filter: url(#glass-distortion);
    }
  </style>
</head>
<body>

  <div class="wrapper">

      </div>
      <div class="chat-line">
        <span class="username" style="color:#7b68ee">gaurev7156</span><span class="colon">: </span><span class="message">brooo the 3D</span>
      </div>
      <div class="chat-line">
        <span class="username" style="color:#45b5aa">Chamboras</span><span class="colon">: </span><span class="message">NEW INTRO HYPE</span>
      </div>
      <div class="chat-line">
        <span class="username" style="color:#d4c443">harrys4nders</span><span class="colon">: </span><span class="message">actual movie quality</span>
      </div>
      <div class="chat-line">
        <span class="username" style="color:#ff69b4">chikooooo</span><span class="colon">: </span><span class="message">chat we are so back</span>
      </div>
    </div>

    <div class="glass-rect"></div>
  </div>

  <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
      <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%"
              colorInterpolationFilters="sRGB">
        <!-- Step 1: Generate noise -->
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.006"
                      numOctaves="2" seed="92" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurred_noise" />

        <!-- Step 2: Neutral gray (128 = zero displacement) -->
        <feFlood flood-color="rgb(128,128,128)" flood-opacity="1" result="neutral" />

        <!-- Step 3: Edge mask (white at edges, black at center) -->
        <feImage id="fi-mask" x="0" y="0" width="296" height="336"
                 result="edge_mask" preserveAspectRatio="none" />

        <!-- Step 4: Blend noise toward neutral using mask as factor -->
        <!-- result = mask * noise + (1 - mask) * neutral -->

        <!-- mask * noise -->
        <feComposite in="blurred_noise" in2="edge_mask" operator="arithmetic"
                     k1="1" k2="0" k3="0" k4="0" result="masked_noise" />

        <!-- invert mask -->
        <feComponentTransfer in="edge_mask" result="inv_mask">
          <feFuncR type="linear" slope="-1" intercept="1" />
          <feFuncG type="linear" slope="-1" intercept="1" />
          <feFuncB type="linear" slope="-1" intercept="1" />
        </feComponentTransfer>

        <!-- (1-mask) * neutral -->
        <feComposite in="neutral" in2="inv_mask" operator="arithmetic"
                     k1="1" k2="0" k3="0" k4="0" result="masked_neutral" />

        <!-- Add: masked_noise + masked_neutral -->
        <feComposite in="masked_noise" in2="masked_neutral" operator="arithmetic"
                     k1="0" k2="1" k3="1" k4="0" result="final_disp" />

        <!-- Step 5: Displace -->
        <feDisplacementMap in="SourceGraphic" in2="final_disp"
                          scale="55" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <script>
    // Edge mask: white at edges (distortion), black at center (no distortion)
    const MASK_SIZE = 256;
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = MASK_SIZE; maskCanvas.height = MASK_SIZE;
    const mCtx = maskCanvas.getContext('2d');
    const maskData = mCtx.createImageData(MASK_SIZE, MASK_SIZE);
    const md = maskData.data;

    const W = 296, H = 336, R = 16;
    const halfW = W / 2, halfH = H / 2;
    const FALLOFF = 35; // narrow band — distortion dies within ~35px of edge

    for (let py = 0; py < MASK_SIZE; py++) {
      for (let px = 0; px < MASK_SIZE; px++) {
        const idx = (py * MASK_SIZE + px) * 4;
        // Map to element-centered coordinates
        const ex = (px / (MASK_SIZE - 1)) * W - halfW;
        const ey = (py / (MASK_SIZE - 1)) * H - halfH;

        // Rounded rect SDF (negative inside)
        const qx = Math.max(Math.abs(ex) - halfW + R, 0);
        const qy = Math.max(Math.abs(ey) - halfH + R, 0);
        const sdf = Math.sqrt(qx*qx + qy*qy) - R
                  + Math.min(Math.max(Math.abs(ex) - halfW + R, Math.abs(ey) - halfH + R), 0);

        // Distance from nearest edge (positive going inward)
        const distFromEdge = -sdf;

        // 0 at center (no distortion), 1 at edge (full distortion)
        const t = Math.min(distFromEdge / FALLOFF, 1); // 0 at edge, 1 at 35px in
        const edgeFactor = Math.pow(1 - t, 3); // cubic falloff — drops fast then tapers
        const v = Math.round(edgeFactor * 255);

        md[idx] = v; md[idx+1] = v; md[idx+2] = v; md[idx+3] = 255;
      }
    }

    mCtx.putImageData(maskData, 0, 0);
    const maskUrl = maskCanvas.toDataURL();
    document.getElementById('fi-mask').setAttribute('href', maskUrl);
  </script>

</body>
</html>
